services:
  dllm-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: ${DOCKER_IMAGE_NAME:-dllm-server:latest}
    container_name: ${DOCKER_CONTAINER_NAME:-dllm-server}
    restart: unless-stopped
    env_file:
      - .server_env
    ports:
      - "${DLLM_SERVER_PORT:-8000}:8000"
    volumes:
      - ./data/server:/app/data
      - ./.server_env:/app/.server_env:ro
  dllm-web:
    image: node:20-alpine
    container_name: ${DOCKER_WEB_CONTAINER_NAME:-dllm-web}
    restart: unless-stopped
    working_dir: /web
    env_file:
      - .server_env
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-/api}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://dllm-server:8000}
      VITE_API_KEY: ${VITE_API_KEY:-}
      VITE_USE_MOCK: ${VITE_USE_MOCK:-false}
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port ${DLLM_WEB_PORT:-5173}"
    ports:
      - "${DLLM_WEB_PORT:-5173}:5173"
    volumes:
      - ./server/web:/web
    depends_on:
      - dllm-server
